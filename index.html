<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Speed - Touch Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #111;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            pointer-events: none;
            z-index: 10;
        }
        .stat { font-size: 18px; margin-bottom: 2px; font-weight: bold; }
        
        /* Mini-Map / Radar Styling */
        #radar {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 100px;
            height: 130px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            z-index: 20;
        }
        #radar-player {
            position: absolute;
            left: 50%;
            bottom: 15px;
            width: 6px;
            height: 10px;
            background: #ff0000;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .radar-dot {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            transform: translateX(-50%);
        }

        /* Touch Controls Styling */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 50;
        }
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 10px; }
        .touch-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            user-select: none;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.6); }
        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border: 3px solid #ffaa00;
            border-radius: 20px;
            z-index: 100;
            width: 80%;
        }
        #alert {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            color: #ff0000;
            display: none;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px white;
            z-index: 20;
        }
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5; opacity: 0;
        }
        button {
            background: #ff5500; color: white; border: none; padding: 12px 24px;
            font-size: 18px; cursor: pointer; margin-top: 15px; border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>
    
    <div id="ui">
        <div class="stat">SPEED: <span id="speed">0</span></div>
        <div class="stat">SCORE: <span id="score">0</span></div>
    </div>

    <div id="radar">
        <div id="radar-player"></div>
        <div id="radar-dots"></div>
    </div>
    
    <div id="alert">🚨 POLICE 🚨</div>

    <div id="msg">
        <h1 style="color: #ff5500; margin: 0;">BUSTED!</h1>
        <p>SCORE: <span id="final-score">0</span></p>
        <button onclick="resetGame()">RETRY</button>
    </div>

    <!-- Touch Interface -->
    <div id="controls">
        <div class="d-pad">
            <div class="touch-btn btn-up" id="btn-up">▲</div>
            <div class="touch-btn btn-left" id="btn-left">◀</div>
            <div class="touch-btn btn-down" id="btn-down">▼</div>
            <div class="touch-btn btn-right" id="btn-right">▶</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, playerCar;
        let road, obstacles = [], buildings = [], lanes = [-2.5, 0, 2.5];
        let speed = 0;
        let score = 0;
        let isGameOver = false;
        let moveLeft = false, moveRight = false, moveForward = false, moveBackward = false;
        let clock = new THREE.Clock();
        let exhaustFlames = [];
        let audioCtx, sirenOscillator, sirenGain, isAudioStarted = false;

        function startAudio() {
            if (isAudioStarted) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sirenGain = audioCtx.createGain();
            sirenGain.gain.setValueAtTime(0, audioCtx.currentTime);
            sirenGain.connect(audioCtx.destination);
            isAudioStarted = true;
        }

        function playSirenEffect(active) {
            if (!isAudioStarted) return;
            if (active && !sirenOscillator) {
                sirenOscillator = audioCtx.createOscillator();
                sirenOscillator.type = 'square';
                sirenOscillator.connect(sirenGain);
                sirenOscillator.start();
            } else if (!active && sirenOscillator) {
                sirenOscillator.stop();
                sirenOscillator.disconnect();
                sirenOscillator = null;
            }
            if (active) {
                const freq = 440 + Math.sin(audioCtx.currentTime * 5) * 200;
                sirenOscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                sirenGain.gain.setTargetAtTime(0.03, audioCtx.currentTime, 0.1);
            } else {
                sirenGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 50, 400);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 25); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            createRoad();
            createPlayerCar();
            for(let i = 0; i < 60; i++) spawnBuilding(-i * 40);

            // Desktop controls
            window.addEventListener('keydown', e => {
                startAudio();
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
                if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
                if (e.key === 'ArrowUp' || e.key === 'w') moveForward = true;
                if (e.key === 'ArrowDown' || e.key === 's') moveBackward = true;
            });
            window.addEventListener('keyup', e => {
                if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
                if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
                if (e.key === 'ArrowUp' || e.key === 'w') moveForward = false;
                if (e.key === 'ArrowDown' || e.key === 's') moveBackward = false;
            });

            // Touch controls
            const setupTouch = (id, setter) => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); startAudio(); setter(true); });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); setter(false); });
            };
            setupTouch('btn-up', v => moveForward = v);
            setupTouch('btn-down', v => moveBackward = v);
            setupTouch('btn-left', v => moveLeft = v);
            setupTouch('btn-right', v => moveRight = v);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function createRoad() {
            road = new THREE.Mesh(new THREE.PlaneGeometry(12, 4000), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            road.rotation.x = -Math.PI / 2;
            road.position.z = -2000;
            scene.add(road);
            for(let i = 0; i < 400; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 5), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.05, -i * 15);
                scene.add(line);
            }
        }

        function createPlayerCar() {
            playerCar = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.4, 3.8), new THREE.MeshPhongMaterial({ color: 0xff0000 }));
            body.position.y = 0.5;
            playerCar.add(body);
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.45, 1.5), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            roof.position.set(0, 0.9, -0.2);
            playerCar.add(roof);
            
            const flameGeo = new THREE.ConeGeometry(0.2, 1, 8);
            const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
            [[-0.5, 0.3, 1.9], [0.5, 0.3, 1.9]].forEach(pos => {
                const f = new THREE.Mesh(flameGeo, flameMat);
                f.position.set(...pos); f.rotation.x = Math.PI/2;
                playerCar.add(f); exhaustFlames.push(f);
            });
            scene.add(playerCar);
        }

        function createNPCCar(isPolice) {
            const car = new THREE.Group();
            car.add(new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 3.5), new THREE.MeshPhongMaterial({ color: 0x00cc00 })));
            if (isPolice) {
                const sirenL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.3), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                sirenL.position.set(-0.25, 0.6, 0); car.add(sirenL);
                const sirenR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.3), new THREE.MeshBasicMaterial({ color: 0x0000ff }));
                sirenR.position.set(0.25, 0.6, 0); car.add(sirenR);
                const light = new THREE.PointLight(0xff0000, 2, 20); car.add(light);
                car.userData = { isPolice, sirenTimer: 0, sirenL, sirenR, pLight: light };
            }
            return car;
        }

        function spawnBuilding(z) {
            const h = 20 + Math.random() * 60;
            const b = new THREE.Mesh(new THREE.BoxGeometry(15, h, 15), new THREE.MeshPhongMaterial({ color: 0x888888 }));
            b.position.set(Math.random() > 0.5 ? 25 : -25, h/2, z);
            scene.add(b); buildings.push(b);
        }

        function spawnObstacle() {
            if (isGameOver) return;
            const isPolice = Math.random() > 0.7;
            const enemy = createNPCCar(isPolice);
            enemy.position.set(lanes[Math.floor(Math.random()*3)], 0.5, isPolice ? playerCar.position.z + 50 : playerCar.position.z - 200);
            scene.add(enemy); obstacles.push(enemy);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) return;
            const delta = clock.getDelta();

            if (moveForward) speed = Math.min(speed + 3, 400); 
            else if (moveBackward) speed = Math.max(speed - 3, 0);
            else speed = Math.max(speed - 1, 0);

            if (moveLeft && playerCar.position.x > -4.5) playerCar.position.x -= 0.3;
            if (moveRight && playerCar.position.x < 4.5) playerCar.position.x += 0.3;

            playerCar.position.z -= (speed / 100);
            camera.position.set(playerCar.position.x * 0.5, 18, playerCar.position.z + 25);
            camera.lookAt(playerCar.position.x, 0, playerCar.position.z - 40);

            exhaustFlames.forEach(f => {
                f.visible = speed > 50;
                f.scale.y = 0.5 + Math.random() * (speed / 100);
            });

            document.getElementById('speed').innerText = Math.floor(speed) + " KM/H";
            if (speed > 10) score += 1;
            document.getElementById('score').innerText = score;

            if (Math.random() < 0.02) spawnObstacle();

            let policeNearby = false;
            obstacles.forEach((obs, i) => {
                const dist = playerCar.position.distanceTo(obs.position);
                if (obs.userData.isPolice) {
                    if (dist < 100) policeNearby = true;
                    obs.position.z -= (speed / 100) + 0.1;
                    obs.position.x += (playerCar.position.x - obs.position.x) * 0.02;
                    obs.userData.sirenTimer += delta * 15;
                    const flash = Math.sin(obs.userData.sirenTimer) > 0;
                    obs.userData.sirenL.material.color.set(flash ? 0xff0000 : 0x330000);
                    obs.userData.sirenR.material.color.set(flash ? 0x000033 : 0x0000ff);
                } else {
                    obs.position.z -= 0.5;
                }
                if (dist < 2.5) gameOver();
                if (obs.position.z > playerCar.position.z + 50) {
                    scene.remove(obs); obstacles.splice(i, 1);
                }
            });

            document.getElementById('alert').style.display = policeNearby ? 'block' : 'none';
            playSirenEffect(policeNearby);
            
            // Update Radar
            const dots = document.getElementById('radar-dots');
            dots.innerHTML = '';
            obstacles.forEach(obs => {
                const relZ = obs.position.z - playerCar.position.z;
                if (relZ < 0 && relZ > -150) {
                    const dot = document.createElement('div');
                    dot.className = 'radar-dot';
                    dot.style.left = (50 + obs.position.x * 8) + 'px';
                    dot.style.top = (115 + relZ * 0.8) + 'px';
                    dot.style.background = '#00ff00';
                    dots.appendChild(dot);
                }
            });

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameOver = true;
            playSirenEffect(false);
            document.getElementById('final-score').innerText = score;
            document.getElementById('msg').style.display = 'block';
        }

        function resetGame() {
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
